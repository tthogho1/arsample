<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimum-scale=1.0">
    <title>AR.js Location Based AR Sample</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Location-based AR.js build, pinned to a stable release -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="info">Waiting for GPS...</div>
    <button id="mode-toggle" type="button">Mode: GPS (50m N)</button>
    <button id="orient-permission" type="button" style="display:none;">Enable Compass</button>

    <!-- Arrow indicator pointing toward the GPS signboard -->
    <div id="arrow-wrap">
        <div id="arrow">▲</div>
        <div id="arrow-label">Look this way</div>
    </div>

    <div id="direction-controls">
        <button type="button" class="dir-btn" data-dir="N">N</button>
        <button type="button" class="dir-btn" data-dir="E">E</button>
        <button type="button" class="dir-btn" data-dir="S">S</button>
        <button type="button" class="dir-btn" data-dir="W">W</button>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
        renderer="antialias: true; alpha: true">

        <!-- Reusable signboard parts -->
        <a-assets>
            <a-mixin id="panel"
                geometry="primitive: plane; width: 4; height: 2.4"
                material="color: #FFFFFF; side: double; shader: flat"></a-mixin>

            <a-mixin id="frame-h"
                geometry="primitive: plane; width: 4.2; height: 0.15"
                material="color: #0066CC; side: double; shader: flat"></a-mixin>

            <a-mixin id="frame-v"
                geometry="primitive: plane; width: 0.15; height: 2.55"
                material="color: #0066CC; side: double; shader: flat"></a-mixin>

            <a-mixin id="title-text"
                text="value: Welcome!; align: center; color: #0066CC; width: 6"
                material="shader: flat"></a-mixin>

            <a-mixin id="pole"
                geometry="primitive: box; width: 0.2; height: 3; depth: 0.2"
                material="color: #8B5A2B"></a-mixin>
        </a-assets>

        <a-camera gps-new-camera="gpsMinDistance: 5">
            <!-- Front-facing signboard: child of camera, always in front -->
            <a-entity id="signboard-front" visible="false" position="0 0 -5">
                <a-entity mixin="panel" position="0 0 0"></a-entity>
                <a-entity position="0 0 0.01">
                    <a-entity mixin="frame-h" position="0 1.25 0"></a-entity>
                    <a-entity mixin="frame-h" position="0 -1.25 0"></a-entity>
                    <a-entity mixin="frame-v" position="-2.07 0 0"></a-entity>
                    <a-entity mixin="frame-v" position="2.07 0 0"></a-entity>
                </a-entity>
                <a-entity mixin="title-text" position="0 0.6 0.05"></a-entity>
                <a-text value="Front mode (5m)" align="center" color="#333333"
                        width="5" position="0 -0.2 0.05" material="shader: flat"></a-text>
            </a-entity>
        </a-camera>

        <!-- GPS-placed signboard (positioned dynamically from current location) -->
        <!-- Oversized + elevated so it's visible from a 2nd-floor balcony too -->
        <a-entity id="signboard"
                  visible="false"
                  rotation="0 0 0"
                  scale="1 1 1">
            <!-- Pole: 8 m tall -->
            <a-box color="#8B5A2B"
                   width="0.6" depth="0.6" height="8"
                   position="0 4 0"></a-box>
            <!-- Panel: 12 m x 7 m, centered at y=11 (very visible from 2nd floor) -->
            <a-entity id="signboard-panel" position="0 11 0">
                <!-- Front face -->
                <a-plane width="12" height="7" color="#FFFFFF"
                         material="side: double; shader: flat"></a-plane>
                <a-entity position="0 0 0.02">
                    <a-plane width="12.5" height="0.4" color="#0066CC" position="0 3.7 0" material="side: double; shader: flat"></a-plane>
                    <a-plane width="12.5" height="0.4" color="#0066CC" position="0 -3.7 0" material="side: double; shader: flat"></a-plane>
                    <a-plane width="0.4" height="7.4" color="#0066CC" position="-6.05 0 0" material="side: double; shader: flat"></a-plane>
                    <a-plane width="0.4" height="7.4" color="#0066CC" position="6.05 0 0" material="side: double; shader: flat"></a-plane>
                </a-entity>
                <a-text value="Welcome!" align="center" color="#0066CC"
                        width="20" position="0 1.5 0.05" material="shader: flat"></a-text>
                <a-text id="signboard-coord"
                        value=""
                        align="center"
                        color="#333333"
                        width="16"
                        position="0 -0.5 0.05"
                        material="shader: flat"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script src="app.js"></script>
</body>
</html>
