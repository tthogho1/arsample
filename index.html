<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimum-scale=1.0">
    <title>AR.js Location Based AR Sample</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Use the location-based build (aframe-ar.js), pinned to a stable AR.js release -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 8px 12px;
            font-family: sans-serif;
            font-size: 14px;
            border-radius: 6px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="info">Waiting for GPS...</div>

    <a-scene
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
        renderer="antialias: true; alpha: true">

        <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>

        <!-- Target: signboard-style object placed dynamically near the user's current location -->
        <a-entity
            id="signboard"
            visible="false"
            look-at="[gps-new-camera]"
            scale="30 30 30">

            <!-- Signboard body (white panel) -->
            <a-plane
                width="4"
                height="2.4"
                color="#FFFFFF"
                material="side: double; shader: flat"
                position="0 3 0">
            </a-plane>

            <!-- Frame (blue border) -->
            <a-entity position="0 3 0.01">
                <a-plane width="4.2" height="0.15" color="#0066CC" position="0 1.25 0" material="side: double; shader: flat"></a-plane>
                <a-plane width="4.2" height="0.15" color="#0066CC" position="0 -1.25 0" material="side: double; shader: flat"></a-plane>
                <a-plane width="0.15" height="2.55" color="#0066CC" position="-2.07 0 0" material="side: double; shader: flat"></a-plane>
                <a-plane width="0.15" height="2.55" color="#0066CC" position="2.07 0 0" material="side: double; shader: flat"></a-plane>
            </a-entity>

            <!-- Title text -->
            <a-text
                value="Welcome!"
                align="center"
                color="#0066CC"
                width="6"
                position="0 3.5 0.05"
                material="shader: flat">
            </a-text>

            <!-- Subtext (coordinates) -->
            <a-text
                id="signboard-coord"
                value=""
                align="center"
                color="#333333"
                width="5"
                position="0 2.6 0.05"
                material="shader: flat">
            </a-text>

            <!-- Pole -->
            <a-box
                color="#8B5A2B"
                depth="0.2"
                height="3"
                width="0.2"
                position="0 0.5 0">
            </a-box>
        </a-entity>

    </a-scene>

    <script>
        const info = document.getElementById('info');
        const signboard = document.getElementById('signboard');
        const coordText = document.getElementById('signboard-coord');
        let placed = false;
        let arReady = false;

        // Sanity check: make sure AR.js / A-Frame loaded and the components exist
        window.addEventListener('load', () => {
            const missing = [];
            if (typeof AFRAME === 'undefined') missing.push('A-Frame');
            else if (!AFRAME.components['gps-new-camera']) missing.push('AR.js (gps-new-camera)');
            if (missing.length) {
                info.innerHTML = 'Failed to load: ' + missing.join(', ') +
                    '<br>Check the network tab / CDN URLs.';
                console.error('Missing libraries:', missing);
            }
        });

        // Return a latitude/longitude offset by the given meters from the source point
        function offsetLatLon(lat, lon, northMeters, eastMeters) {
            const dLat = northMeters / 111320; // 1 degree latitude ~= 111.32 km
            const dLon = eastMeters / (111320 * Math.cos(lat * Math.PI / 180));
            return { lat: lat + dLat, lon: lon + dLon };
        }

        // Place the signboard ~10 m north of the given coordinates
        function placeSignboard(lat, lon, sourceLabel) {
            if (placed) return;
            const target = offsetLatLon(lat, lon, 10, 0);
            signboard.setAttribute(
                'gps-new-entity-place',
                `latitude: ${target.lat}; longitude: ${target.lon}`
            );
            coordText.setAttribute(
                'value',
                `${target.lat.toFixed(6)}, ${target.lon.toFixed(6)}`
            );
            signboard.setAttribute('visible', 'true');
            placed = true;
            console.log(`Signboard placed (${sourceLabel}) at`, target);
        }

        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const acc = pos.coords.accuracy.toFixed(1);
                    info.innerHTML =
                        `Current: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>` +
                        `Accuracy: ±${acc}m` +
                        (arReady ? '<br>AR ready' : '');

                    placeSignboard(lat, lon, 'GPS');
                },
                (err) => {
                    info.innerText = 'GPS error: ' + err.message +
                        ' — falling back to Tokyo Station for demo.';
                    // Debug fallback so something still shows up on a PC indoors
                    placeSignboard(35.681236, 139.767125, 'fallback');
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 27000 }
            );

            // Safety net: if no GPS fix arrives within 30 s, use the fallback
            setTimeout(() => {
                if (!placed) {
                    info.innerHTML += '<br>No GPS fix in 30 s — using fallback location.';
                    placeSignboard(35.681236, 139.767125, 'timeout-fallback');
                }
            }, 30000);
        } else {
            info.innerText = 'This browser does not support the Geolocation API.';
            placeSignboard(35.681236, 139.767125, 'no-geolocation');
        }

        window.addEventListener('gps-camera-update-position', (e) => {
            arReady = true;
            console.log('Camera position:', e.detail.position);
        });
    </script>
</body>
</html>
